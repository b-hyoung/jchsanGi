<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220" font-family="'Malgun Gothic', Arial, sans-serif">
  <rect width="700" height="220" fill="#f0f8ff" rx="10"/>

  <!-- 인공지능 박스 -->
  <rect x="20" y="30" width="200" height="160" fill="#e0f0ff" stroke="#4a90d9" stroke-width="2" rx="8"/>
  <text x="120" y="58" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5fa8">( ㉠ )</text>
  <text x="120" y="80" text-anchor="middle" font-size="12" fill="#333">사고나 학습등 인간이</text>
  <text x="120" y="97" text-anchor="middle" font-size="12" fill="#333">가진 지적 능력을</text>
  <text x="120" y="114" text-anchor="middle" font-size="12" fill="#333">컴퓨터를 통해</text>
  <text x="120" y="131" text-anchor="middle" font-size="12" fill="#333">구현하는 기술</text>
  <image x="60" y="140" width="120" height="40" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 40'%3E%3Ccircle cx='20' cy='20' r='18' fill='%23cce0f5' stroke='%234a90d9'/%3E%3Ccircle cx='50' cy='20' r='12' fill='%23fff' stroke='%234a90d9'/%3E%3Ccircle cx='80' cy='20' r='8' fill='%234a90d9'/%3E%3C/svg%3E"/>

  <!-- 머신러닝 박스 -->
  <rect x="250" y="30" width="200" height="160" fill="#e8f5e9" stroke="#43a047" stroke-width="2" rx="8"/>
  <text x="350" y="55" text-anchor="middle" font-size="13" fill="#2e7d32">Machine Learning</text>
  <text x="350" y="75" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b5e20">머신러닝</text>
  <text x="350" y="100" text-anchor="middle" font-size="12" fill="#333">컴퓨터가 스스로</text>
  <text x="350" y="117" text-anchor="middle" font-size="12" fill="#333">학습하여 인공지능의</text>
  <text x="350" y="134" text-anchor="middle" font-size="12" fill="#333">성능을 향상시키는</text>
  <text x="350" y="151" text-anchor="middle" font-size="12" fill="#333">기술 방법</text>
  <circle cx="290" cy="175" r="14" fill="#a5d6a7" stroke="#43a047"/>
  <circle cx="315" cy="170" r="10" fill="#c8e6c9" stroke="#43a047"/>
  <circle cx="340" cy="175" r="14" fill="#a5d6a7" stroke="#43a047"/>

  <!-- 딥러닝 박스 -->
  <rect x="480" y="30" width="200" height="160" fill="#fce4ec" stroke="#e53935" stroke-width="2" rx="8"/>
  <text x="580" y="55" text-anchor="middle" font-size="13" fill="#c62828">Deep Learning</text>
  <text x="580" y="75" text-anchor="middle" font-size="18" font-weight="bold" fill="#b71c1c">딥러닝</text>
  <text x="580" y="100" text-anchor="middle" font-size="12" fill="#333">인간의 뉴런과</text>
  <text x="580" y="117" text-anchor="middle" font-size="12" fill="#333">비슷한 인공신경망</text>
  <text x="580" y="134" text-anchor="middle" font-size="12" fill="#333">방식으로</text>
  <text x="580" y="151" text-anchor="middle" font-size="12" fill="#333">정보를 처리</text>
  <!-- 신경망 노드 표현 -->
  <circle cx="510" cy="178" r="8" fill="#ffcdd2" stroke="#e53935"/>
  <circle cx="530" cy="165" r="8" fill="#ffcdd2" stroke="#e53935"/>
  <circle cx="530" cy="185" r="8" fill="#ffcdd2" stroke="#e53935"/>
  <circle cx="555" cy="172" r="8" fill="#ef9a9a" stroke="#e53935"/>
  <circle cx="575" cy="178" r="8" fill="#ef9a9a" stroke="#e53935"/>
  <circle cx="600" cy="178" r="8" fill="#e53935"/>
  <line x1="518" y1="178" x2="522" y2="169" stroke="#e53935" stroke-width="1"/>
  <line x1="518" y1="178" x2="522" y2="181" stroke="#e53935" stroke-width="1"/>
  <line x1="538" y1="169" x2="547" y2="174" stroke="#e53935" stroke-width="1"/>
  <line x1="538" y1="183" x2="547" y2="175" stroke="#e53935" stroke-width="1"/>
  <line x1="563" y1="174" x2="567" y2="178" stroke="#e53935" stroke-width="1"/>
  <line x1="583" y1="178" x2="592" y2="178" stroke="#e53935" stroke-width="1"/>
</svg>
