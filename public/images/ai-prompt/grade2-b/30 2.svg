<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" width="680" height="240" font-family="'Malgun Gothic', Arial, sans-serif">
  <rect width="680" height="240" fill="#fafafa" rx="10" stroke="#ddd" stroke-width="1"/>

  <!-- 상단 행: 원본 이미지 → AI 이미지 편집 → 정상 출력 -->
  <rect x="30" y="30" width="130" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="95" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">원본 이미지</text>

  <text x="200" y="60" text-anchor="middle" font-size="11" fill="#555">AI 이미지 편집</text>
  <line x1="160" y1="55" x2="240" y2="55" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="30" width="160" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="330" y="53" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">정상적인</text>
  <text x="330" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">이미지 출력</text>

  <!-- 하단 행: ㉠ 적용 → AI 이미지 편집 → 부자연스러운 출력 -->
  <rect x="30" y="150" width="130" height="60" fill="#ffcdd2" stroke="#c62828" stroke-width="2" rx="6"/>
  <text x="95" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">( ㉠ ) 적용</text>
  <text x="95" y="192" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">이미지</text>

  <text x="200" y="185" text-anchor="middle" font-size="11" fill="#555">AI 이미지 편집</text>
  <line x1="160" y1="180" x2="240" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="150" width="160" height="60" fill="#fce4ec" stroke="#c62828" stroke-width="2" rx="6"/>
  <text x="330" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">부자연스러운</text>
  <text x="330" y="192" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">이미지 출력</text>

  <!-- 원본 → ㉠ 수직 연결 -->
  <line x1="95" y1="80" x2="95" y2="150" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- 우측 설명 -->
  <rect x="440" y="25" width="220" height="200" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="8"/>
  <text x="550" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">( ㉠ ) 설명</text>
  <text x="450" y="75" font-size="11" fill="#333">• AI가 이미지를 이해하는 것을</text>
  <text x="450" y="93" font-size="11" fill="#333">  방해하는 방식</text>
  <text x="450" y="115" font-size="11" fill="#333">• 이미지의 중심 픽셀을 선택해</text>
  <text x="450" y="133" font-size="11" fill="#333">  왜곡시킴</text>
  <text x="450" y="155" font-size="11" fill="#333">• 인간의 눈에는 감지 안 됨</text>
  <text x="450" y="177" font-size="11" fill="#333">• AI는 감지 가능</text>
</svg>
